<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stedje AI</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
    #chat-container { width: 400px; max-width: 90%; background: #fff; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
    #chat { padding: 20px; flex: 1; overflow-y: auto; }
    .message { margin: 10px 0; padding: 10px; border-radius: 8px; max-width: 80%; }
    .user { background: #007bff; color: white; align-self: flex-end; }
    .bot { background: #e5e5ea; color: black; align-self: flex-start; }
    #input-container { display: flex; border-top: 1px solid #ccc; }
    #input { flex: 1; padding: 10px; border: none; border-radius: 0 0 0 10px; outline: none; }
    #send { padding: 10px; border: none; background: #007bff; color: white; cursor: pointer; border-radius: 0 0 10px 0; }
  </style>
</head>
<body>
  <div id="chat-container">
    <div id="chat"></div>
    <div id="input-container">
      <input type="text" id="input" placeholder="Ask Stedje AI something..." />
      <button id="send">Send</button>
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const send = document.getElementById('send');

    send.addEventListener('click', askAI);
    input.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') askAI();
    });

    function addMessage(text, sender) {
      const msg = document.createElement('div');
      msg.classList.add('message', sender);
      msg.textContent = text;
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }

    function typeMessage(text, sender) {
      const msg = document.createElement('div');
      msg.classList.add('message', sender);
      chat.appendChild(msg);
      let i = 0;
      function type() {
        if (i < text.length) {
          msg.innerHTML += text.charAt(i) === '\n' ? '<br>' : text.charAt(i);
          i++;
          setTimeout(type, 15);
        }
      }
      type();
      chat.scrollTop = chat.scrollHeight;
    }

    function showTyping() {
      const typing = document.createElement('div');
      typing.classList.add('message', 'bot');
      typing.id = 'typing';
      typing.textContent = 'Stedje AI is typing...';
      chat.appendChild(typing);
      chat.scrollTop = chat.scrollHeight;
    }

    function removeTyping() {
      const typing = document.getElementById('typing');
      if (typing) typing.remove();
    }

    async function askAI() {
      const userInput = input.value.trim();
      if (!userInput) return;

      addMessage(userInput, 'user');
      input.value = '';

      showTyping();

      try {
        const res = await fetch("https://stedjeai.onrender.com/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: userInput })
        });

        const data = await res.json();
        removeTyping();
        typeMessage(data.reply, 'bot');
      } catch (err) {
        removeTyping();
        typeMessage("Error: Could not reach Stedje AI.", 'bot');
      }
    }
  </script>
</body>
</html>
